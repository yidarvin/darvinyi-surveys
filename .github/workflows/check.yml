name: check

# The backstop for when a run forgets the gate. This travels with every "Use this
# template" clone. It runs the same one command a local run must pass: npm run check.
on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check
